<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack - نظام إدارة الطلاب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
        .glass-dark { background: rgba(30,27,75,0.95); backdrop-filter: blur(10px); }
        .card-hover { transition: all 0.3s; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .sidebar-link { transition: all 0.3s; }
        .sidebar-link:hover, .sidebar-link.active { background: linear-gradient(90deg, rgba(79,70,229,0.2) 0%, transparent 100%); border-right: 3px solid #4f46e5; }
        .animate-fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .qr-container { background: white; padding: 20px; border-radius: 16px; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 4px; }
    </style>
</head>
<body class="text-gray-800">

<!-- Login Screen -->
<div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="glass rounded-3xl shadow-2xl w-full max-w-md p-8 animate-fade-in">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-2xl mx-auto flex items-center justify-center mb-4">
                <i class="fas fa-graduation-cap text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">EduTrack</h1>
            <p class="text-gray-500">نظام إدارة الطلاب الذكي</p>
        </div>
        <div class="space-y-4">
            <div class="flex gap-2 mb-6">
                <button onclick="switchLoginType('teacher')" id="teacherLoginBtn" class="flex-1 py-3 rounded-xl bg-indigo-600 text-white font-semibold">معلم</button>
                <button onclick="switchLoginType('student')" id="studentLoginBtn" class="flex-1 py-3 rounded-xl bg-gray-200 text-gray-600 font-semibold">طالب</button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">اسم المستخدم</label>
                    <input type="text" id="loginEmail" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-600 focus:ring-2 focus:ring-indigo-200 outline-none" placeholder="teacher أو student1">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">كلمة المرور</label>
                    <input type="password" id="loginPassword" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-600 focus:ring-2 focus:ring-indigo-200 outline-none" placeholder="123456">
                </div>
                <button onclick="handleLogin()" class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold text-lg shadow-lg hover:shadow-xl transition-all">تسجيل الدخول</button>
            </div>
            <div class="mt-6 text-center text-sm text-gray-500">
                <p>حسابات تجريبية:</p>
                <p class="mt-1">معلم: teacher / 123456</p>
                <p>طالب: student1 / 123456</p>
            </div>
        </div>
    </div>
</div>

<!-- Main App -->
<div id="mainApp" class="hidden min-h-screen flex">
    <aside id="sidebar" class="w-72 glass-dark text-white h-screen fixed right-0 top-0 z-40 overflow-y-auto transition-transform transform translate-x-0">
        <div class="p-6">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-12 h-12 bg-gradient-to-br from-indigo-500 to-cyan-500 rounded-xl flex items-center justify-center">
                    <i class="fas fa-graduation-cap text-xl"></i>
                </div>
                <div>
                    <h2 class="font-bold text-lg">EduTrack</h2>
                    <p class="text-xs text-gray-400" id="userRole">لوحة التحكم</p>
                </div>
            </div>
            <nav class="space-y-2" id="sidebarNav"></nav>
            <div class="mt-8 pt-6 border-t border-gray-700">
                <div class="flex items-center gap-3 mb-4">
                    <img id="userAvatar" src="" class="w-10 h-10 rounded-full">
                    <div>
                        <p class="font-semibold text-sm" id="userName">المعلم</p>
                        <p class="text-xs text-gray-400" id="userEmail">teacher@edu.com</p>
                    </div>
                </div>
                <button onclick="logout()" class="w-full py-2 rounded-lg bg-red-500/20 text-red-400 hover:bg-red-500/30 transition-all text-sm">
                    <i class="fas fa-sign-out-alt ml-2"></i>تسجيل الخروج
                </button>
            </div>
        </div>
    </aside>

    <div id="mobileOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden"></div>

    <main class="flex-1 mr-0 lg:mr-72 min-h-screen">
        <header class="glass sticky top-0 z-20 px-6 py-4 flex items-center justify-between">
            <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg hover:bg-gray-100"><i class="fas fa-bars text-xl"></i></button>
            <h1 id="pageTitle" class="text-2xl font-bold text-gray-800">الرئيسية</h1>
            <div class="flex items-center gap-4">
                <button onclick="toggleNotifications()" class="p-2 rounded-lg hover:bg-gray-100 relative">
                    <i class="fas fa-bell text-gray-600"></i>
                    <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                </button>
            </div>
        </header>
        <div class="p-6" id="contentArea"></div>
    </main>
</div>

<div id="studentModal" class="modal"><div class="glass rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto m-4 p-6"><div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold">بيانات الطالب</h2><button onclick="closeModal('studentModal')" class="p-2 hover:bg-gray-100 rounded-lg"><i class="fas fa-times text-xl"></i></button></div><div id="studentModalContent"></div></div></div>
<div id="examModal" class="modal"><div class="glass rounded-2xl w-full max-w-lg m-4 p-6"><h2 class="text-2xl font-bold mb-4">إضافة درجة</h2><div id="examModalContent"></div></div></div>
<div id="qrScannerModal" class="modal"><div class="glass rounded-2xl w-full max-w-md m-4 p-6 text-center"><h2 class="text-2xl font-bold mb-4">مسح QR</h2><input type="text" id="qrInput" class="w-full px-4 py-3 rounded-xl border text-center text-2xl tracking-widest font-mono" placeholder="أدخل الكود" onkeypress="handleQRInput(event)"><div class="mt-4 flex gap-2"><button onclick="simulateQRScan()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold">محاكاة</button><button onclick="closeModal('qrScannerModal')" class="flex-1 py-3 bg-gray-200 rounded-xl font-bold">إلغاء</button></div></div></div>

<script>
const store={currentUser:null,userType:null,students:[{id:'STD001',name:'أحمد محمد علي',email:'student1@edu.com',password:'123456',phone:'0501234567',grade:'الصف الثالث الثانوي',avatar:'https://ui-avatars.com/api/?name=Ahmed+Mohamed&background=4f46e5&color=fff',feesPaid:true,lastPayment:'2024-01-15',attendance:[{date:'2024-01-01',status:'present'},{date:'2024-01-02',status:'present'},{date:'2024-01-03',status:'absent'},{date:'2024-01-04',status:'present'},{date:'2024-01-07',status:'present'},{date:'2024-01-08',status:'present'},{date:'2024-01-09',status:'present'},{date:'2024-01-10',status:'absent'},{date:'2024-01-11',status:'present'},{date:'2024-01-14',status:'present'}],exams:[{subject:'الرياضيات',score:95,max:100,date:'2024-01-10'},{subject:'الفيزياء',score:88,max:100,date:'2024-01-12'},{subject:'الكيمياء',score:92,max:100,date:'2024-01-14'},{subject:'اللغة العربية',score:85,max:100,date:'2024-01-08'},{subject:'اللغة الإنجليزية',score:90,max:100,date:'2024-01-09'},{subject:'الأحياء',score:87,max:100,date:'2024-01-11'}]},{id:'STD002',name:'سارة أحمد حسن',email:'student2@edu.com',password:'123456',phone:'0502345678',grade:'الصف الثالث الثانوي',avatar:'https://ui-avatars.com/api/?name=Sara+Ahmed&background=ec4899&color=fff',feesPaid:false,lastPayment:'2023-12-01',attendance:[{date:'2024-01-01',status:'present'},{date:'2024-01-02',status:'absent'},{date:'2024-01-03',status:'absent'},{date:'2024-01-04',status:'present'},{date:'2024-01-07',status:'present'},{date:'2024-01-08',status:'present'},{date:'2024-01-09',status:'present'},{date:'2024-01-10',status:'present'},{date:'2024-01-11',status:'present'},{date:'2024-01-14',status:'absent'}],exams:[{subject:'الرياضيات',score:78,max:100,date:'2024-01-10'},{subject:'الفيزياء',score:82,max:100,date:'2024-01-12'},{subject:'الكيمياء',score:75,max:100,date:'2024-01-14'},{subject:'اللغة العربية',score:90,max:100,date:'2024-01-08'},{subject:'اللغة الإنجليزية',score:88,max:100,date:'2024-01-09'},{subject:'الأحياء',score:80,max:100,date:'2024-01-11'}]},{id:'STD003',name:'محمد خالد عبدالله',email:'student3@edu.com',password:'123456',phone:'0503456789',grade:'الصف الثاني الثانوي',avatar:'https://ui-avatars.com/api/?name=Mohamed+Khaled&background=10b981&color=fff',feesPaid:true,lastPayment:'2024-01-10',attendance:[{date:'2024-01-01',status:'present'},{date:'2024-01-02',status:'present'},{date:'2024-01-03',status:'present'},{date:'2024-01-04',status:'present'},{date:'2024-01-07',status:'present'},{date:'2024-01-08',status:'absent'},{date:'2024-01-09',status:'present'},{date:'2024-01-10',status:'present'},{date:'2024-01-11',status:'present'},{date:'2024-01-14',status:'present'}],exams:[{subject:'الرياضيات',score:65,max:100,date:'2024-01-10'},{subject:'الفيزياء',score:70,max:100,date:'2024-01-12'},{subject:'الكيمياء',score:68,max:100,date:'2024-01-14'},{subject:'اللغة العربية',score:75,max:100,date:'2024-01-08'},{subject:'اللغة الإنجليزية',score:72,max:100,date:'2024-01-09'},{subject:'الأحياء',score:69,max:100,date:'2024-01-11'}]},{id:'STD004',name:'فاطمة علي حسين',email:'student4@edu.com',password:'123456',phone:'0504567890',grade:'الصف الثالث الثانوي',avatar:'https://ui-avatars.com/api/?name=Fatima+Ali&background=f59e0b&color=fff',feesPaid:true,lastPayment:'2024-01-12',attendance:[{date:'2024-01-01',status:'present'},{date:'2024-01-02',status:'present'},{date:'2024-01-03',status:'present'},{date:'2024-01-04',status:'present'},{date:'2024-01-07',status:'present'},{date:'2024-01-08',status:'present'},{date:'2024-01-09',status:'present'},{date:'2024-01-10',status:'present'},{date:'2024-01-11',status:'present'},{date:'2024-01-14',status:'present'}],exams:[{subject:'الرياضيات',score:98,max:100,date:'2024-01-10'},{subject:'الفيزياء',score:96,max:100,date:'2024-01-12'},{subject:'الكيمياء',score:94,max:100,date:'2024-01-14'},{subject:'اللغة العربية',score:92,max:100,date:'2024-01-08'},{subject:'اللغة الإنجليزية',score:95,max:100,date:'2024-01-09'},{subject:'الأحياء',score:97,max:100,date:'2024-01-11'}]},{id:'STD005',name:'عمر سعيد محمود',email:'student5@edu.com',password:'123456',phone:'0505678901',grade:'الصف الأول الثانوي',avatar:'https://ui-avatars.com/api/?name=Omar+Saeed&background=6366f1&color=fff',feesPaid:false,lastPayment:'2023-11-15',attendance:[{date:'2024-01-01',status:'absent'},{date:'2024-01-02',status:'absent'},{date:'2024-01-03',status:'present'},{date:'2024-01-04',status:'absent'},{date:'2024-01-07',status:'present'},{date:'2024-01-08',status:'absent'},{date:'2024-01-09',status:'present'},{date:'2024-01-10',status:'absent'},{date:'2024-01-11',status:'present'},{date:'2024-01-14',status:'absent'}],exams:[{subject:'الرياضيات',score:45,max:100,date:'2024-01-10'},{subject:'الفيزياء',score:50,max:100,date:'2024-01-12'},{subject:'الكيمياء',score:48,max:100,date:'2024-01-14'},{subject:'اللغة العربية',score:55,max:100,date:'2024-01-08'},{subject:'اللغة الإنجليزية',score:52,max:100,date:'2024-01-09'},{subject:'الأحياء',score:47,max:100,date:'2024-01-11'}]}],teacher:{name:'أ. محمد العلي',email:'teacher@edu.com',password:'123456',avatar:'https://ui-avatars.com/api/?name=Mohamed+Ali&background=4f46e5&color=fff'},notifications:[{id:1,text:'تم تسجيل غياب جديد للطالب أحمد محمد',time:'منذ 5 دقائق',read:false},{id:2,text:'تذكير: موعد اجتماع أولياء الأمور غداً',time:'منذ ساعة',read:false},{id:3,text:'تم إضافة درجات امتحان الرياضيات',time:'منذ 3 ساعات',read:true}]};

let loginType='teacher';
function switchLoginType(type){loginType=type;document.getElementById('teacherLoginBtn').className=type==='teacher'?'flex-1 py-3 rounded-xl bg-indigo-600 text-white font-semibold':'flex-1 py-3 rounded-xl bg-gray-200 text-gray-600 font-semibold';document.getElementById('studentLoginBtn').className=type==='student'?'flex-1 py-3 rounded-xl bg-indigo-600 text-white font-semibold':'flex-1 py-3 rounded-xl bg-gray-200 text-gray-600 font-semibold';}
function handleLogin(){const email=document.getElementById('loginEmail').value;const password=document.getElementById('loginPassword').value;if(loginType==='teacher'){if((email==='teacher'||email==='teacher@edu.com')&&password==='123456'){store.currentUser=store.teacher;store.userType='teacher';initApp();}else{showToast('بيانات الدخول غير صحيحة!','error');}}else{const student=store.students.find(s=>(s.email===email||s.id===email)&&s.password===password);if(student){store.currentUser=student;store.userType='student';initApp();}else{showToast('بيانات الدخول غير صحيحة!','error');}}}
function logout(){store.currentUser=null;store.userType=null;document.getElementById('loginScreen').classList.remove('hidden');document.getElementById('mainApp').classList.add('hidden');}
function initApp(){document.getElementById('loginScreen').classList.add('hidden');document.getElementById('mainApp').classList.remove('hidden');document.getElementById('userName').textContent=store.currentUser.name;document.getElementById('userEmail').textContent=store.currentUser.email||store.currentUser.id;document.getElementById('userAvatar').src=store.currentUser.avatar;document.getElementById('userRole').textContent=store.userType==='teacher'?'لوحة تحكم المعلم':'بوابة الطالب';setupNavigation();if(store.userType==='teacher'){showDashboard();}else{showStudentPortal();}}
function setupNavigation(){const nav=document.getElementById('sidebarNav');if(store.userType==='teacher'){nav.innerHTML=`<a onclick="showDashboard()" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer"><i class="fas fa-home w-5"></i><span>الرئيسية</span></a><a onclick="showStudents()" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer"><i class="fas fa-users w-5"></i><span>الطلاب</span></a><a onclick="showAttendance()" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer"><i class="fas fa-clipboard-check w-5"></i><span>تسجيل الغياب</span></a><a onclick="showExams()" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer"><i class="fas fa-file-alt w-5"></i><span>الامتحانات</span></a><a onclick="showFees()" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer"><i class="fas fa-money-bill-wave w-5"></i><span>الرسوم</span></a><a onclick="showReports()" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer"><i class="fas fa-chart-bar w-5"></i><span>التقارير</span></a>`;}else{nav.innerHTML=`<a onclick="showStudentPortal()" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer"><i class="fas fa-home w-5"></i><span>الرئيسية</span></a><a onclick="showMyQR()" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer"><i class="fas fa-qrcode w-5"></i><span>QR Code</span></a><a onclick="showMyGrades()" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer"><i class="fas fa-graduation-cap w-5"></i><span>درجاتي</span></a><a onclick="showMyAttendance()" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer"><i class="fas fa-calendar-check w-5"></i><span>حضوري</span></a><a onclick="showMyProgress()" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer"><i class="fas fa-chart-line w-5"></i><span>مستواي</span></a>`;}}

function showDashboard(){setActiveNav(0);document.getElementById('pageTitle').textContent='الرئيسية';const totalStudents=store.students.length;const presentToday=store.students.filter(s=>{const today=new Date().toISOString().split('T')[0];const lastAtt=s.attendance[s.attendance.length-1];return lastAtt&&lastAtt.date===today&&lastAtt.status==='present';}).length;const unpaidFees=store.students.filter(s=>!s.feesPaid).length;const avgGrade=(store.students.reduce((acc,s)=>acc+(s.exams.reduce((a,e)=>a+e.score,0)/s.exams.length),0)/totalStudents).toFixed(1);document.getElementById('contentArea').innerHTML=`<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8"><div class="glass rounded-2xl p-6 card-hover"><div class="flex items-center justify-between mb-4"><div class="w-14 h-14 bg-blue-100 rounded-xl flex items-center justify-center"><i class="fas fa-users text-blue-600 text-2xl"></i></div><span class="text-sm text-gray-500">إجمالي الطلاب</span></div><h3 class="text-3xl font-bold text-gray-800">${totalStudents}</h3></div><div class="glass rounded-2xl p-6 card-hover"><div class="flex items-center justify-between mb-4"><div class="w-14 h-14 bg-green-100 rounded-xl flex items-center justify-center"><i class="fas fa-user-check text-green-600 text-2xl"></i></div><span class="text-sm text-gray-500">الحضور اليوم</span></div><h3 class="text-3xl font-bold text-gray-800">${presentToday}</h3></div><div class="glass rounded-2xl p-6 card-hover"><div class="flex items-center justify-between mb-4"><div class="w-14 h-14 bg-yellow-100 rounded-xl flex items-center justify-center"><i class="fas fa-exclamation-triangle text-yellow-600 text-2xl"></i></div><span class="text-sm text-gray-500">رسوم غير مدفوعة</span></div><h3 class="text-3xl font-bold text-gray-800">${unpaidFees}</h3></div><div class="glass rounded-2xl p-6 card-hover"><div class="flex items-center justify-between mb-4"><div class="w-14 h-14 bg-purple-100 rounded-xl flex items-center justify-center"><i class="fas fa-chart-line text-purple-600 text-2xl"></i></div><span class="text-sm text-gray-500">متوسط الدرجات</span></div><h3 class="text-3xl font-bold text-gray-800">${avgGrade}%</h3></div></div><div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="glass rounded-2xl p-6"><h3 class="text-xl font-bold mb-6">توزيع الدرجات</h3><canvas id="gradesChart" height="250"></canvas></div><div class="glass rounded-2xl p-6"><h3 class="text-xl font-bold mb-6">نسبة الحضور</h3><canvas id="attendanceChart" height="250"></canvas></div></div><div class="glass rounded-2xl p-6 mt-6"><div class="flex justify-between items-center mb-6"><h3 class="text-xl font-bold">آخر النشاطات</h3></div><div class="space-y-4">${store.students.slice(0,3).map(s=>`<div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl hover:bg-gray-100 cursor-pointer" onclick="viewStudent('${s.id}')"><div class="flex items-center gap-4"><img src="${s.avatar}" class="w-12 h-12 rounded-full"><div><h4 class="font-bold">${s.name}</h4><p class="text-sm text-gray-500">${s.grade} • ${s.id}</p></div></div><span class="px-3 py-1 rounded-full text-sm ${s.feesPaid?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${s.feesPaid?'الرسوم مدفوعة':'الرسوم متأخرة'}</span></div>`).join('')}</div></div>`;setTimeout(()=>{initCharts();},100);}

function initCharts(){const gradesCtx=document.getElementById('gradesChart');if(gradesCtx){new Chart(gradesCtx,{type:'bar',data:{labels:store.students.map(s=>s.name.split(' ')[0]),datasets:[{label:'متوسط الدرجات',data:store.students.map(s=>(s.exams.reduce((a,e)=>a+e.score,0)/s.exams.length).toFixed(1)),backgroundColor:['#4f46e5','#ec4899','#10b981','#f59e0b','#6366f1'],borderRadius:8}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:100}}}});}const attCtx=document.getElementById('attendanceChart');if(attCtx){const attendanceRates=store.students.map(s=>{const present=s.attendance.filter(a=>a.status==='present').length;return((present/s.attendance.length)*100).toFixed(1);});new Chart(attCtx,{type:'doughnut',data:{labels:store.students.map(s=>s.name.split(' ')[0]),datasets:[{data:attendanceRates,backgroundColor:['#4f46e5','#ec4899','#10b981','#f59e0b','#6366f1'],borderWidth:0}]},options:{responsive:true,cutout:'70%',plugins:{legend:{position:'bottom',labels:{padding:20}}}}});}}

function showStudents(){setActiveNav(1);document.getElementById('pageTitle').textContent='قائمة الطلاب';document.getElementById('contentArea').innerHTML=`<div class="glass rounded-2xl p-6 mb-6"><div class="flex flex-col md:flex-row gap-4 justify-between items-center"><div class="relative w-full md:w-96"><i class="fas fa-search absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"></i><input type="text" id="studentSearch" oninput="filterStudents()" placeholder="ابحث بالاسم أو الكود..." class="w-full pr-12 pl-4 py-3 rounded-xl border border-gray-200 focus:border-indigo-600 focus:ring-2 focus:ring-indigo-200 outline-none"></div><div class="flex gap-2"><select id="gradeFilter" onchange="filterStudents()" class="px-4 py-3 rounded-xl border border-gray-200 outline-none"><option value="">جميع الصفوف</option><option value="الصف الأول الثانوي">الصف الأول</option><option value="الصف الثاني الثانوي">الصف الثاني</option><option value="الصف الثالث الثانوي">الصف الثالث</option></select><button onclick="openQRScanner()" class="px-4 py-3 bg-indigo-600 text-white rounded-xl"><i class="fas fa-qrcode ml-2"></i>مسح QR</button></div></div></div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="studentsGrid">${renderStudentCards(store.students)}</div>`;}

function renderStudentCards(students){return students.map(s=>{const avgScore=(s.exams.reduce((a,e)=>a+e.score,0)/s.exams.length).toFixed(1);const attendanceRate=((s.attendance.filter(a=>a.status==='present').length/s.attendance.length)*100).toFixed(0);return`<div class="glass rounded-2xl p-6 card-hover cursor-pointer" onclick="viewStudent('${s.id}')"><div class="flex items-start justify-between mb-4"><div class="flex items-center gap-3"><img src="${s.avatar}" class="w-14 h-14 rounded-full border-2 border-white shadow-md"><div><h3 class="font-bold text-lg">${s.name}</h3><p class="text-sm text-gray-500">${s.id}</p></div></div><span class="px-2 py-1 rounded-lg text-xs ${s.feesPaid?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${s.feesPaid?'✓ مدفوع':'✗ متأخر'}</span></div><div class="space-y-3"><div class="flex justify-between text-sm"><span class="text-gray-500">الصف</span><span class="font-semibold">${s.grade}</span></div><div class="flex justify-between text-sm"><span class="text-gray-500">متوسط الدرجات</span><span class="font-bold text-indigo-600">${avgScore}%</span></div><div class="flex justify-between text-sm"><span class="text-gray-500">نسبة الحضور</span><span class="font-bold ${attendanceRate>=80?'text-green-600':attendanceRate>=60?'text-yellow-600':'text-red-600'}">${attendanceRate}%</span></div></div><div class="mt-4 pt-4 border-t border-gray-100 flex gap-2"><button onclick="event.stopPropagation();markAttendance('${s.id}','present')" class="flex-1 py-2 bg-green-50 text-green-700 rounded-lg hover:bg-green-100 text-sm font-semibold"><i class="fas fa-check ml-1"></i>حضور</button><button onclick="event.stopPropagation();markAttendance('${s.id}','absent')" class="flex-1 py-2 bg-red-50 text-red-700 rounded-lg hover:bg-red-100 text-sm font-semibold"><i class="fas fa-times ml-1"></i>غياب</button></div></div>`;}).join('');}

function filterStudents(){const search=document.getElementById('studentSearch').value.toLowerCase();const grade=document.getElementById('gradeFilter').value;const filtered=store.students.filter(s=>{const matchSearch=s.name.toLowerCase().includes(search)||s.id.toLowerCase().includes(search);const matchGrade=!grade||s.grade===grade;return matchSearch&&matchGrade;});document.getElementById('studentsGrid').innerHTML=renderStudentCards(filtered);}

function viewStudent(id){const s=store.students.find(st=>st.id===id);if(!s)return;const avgScore=(s.exams.reduce((a,e)=>a+e.score,0)/s.exams.length).toFixed(1);const presentCount=s.attendance.filter(a=>a.status==='present').length;const absentCount=s.attendance.filter(a=>a.status==='absent').length;const attendanceRate=((presentCount/s.attendance.length)*100).toFixed(1);document.getElementById('studentModalContent').innerHTML=`<div class="grid grid-cols-1 lg:grid-cols-3 gap-6"><div class="lg:col-span-1"><div class="glass rounded-2xl p-6 text-center"><img src="${s.avatar}" class="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-indigo-200"><h3 class="text-xl font-bold mb-1">${s.name}</h3><p class="text-gray-500 mb-4">${s.id} • ${s.grade}</p><div class="flex justify-center gap-2 mb-4"><span class="px-3 py-1 rounded-full text-sm ${s.feesPaid?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${s.feesPaid?'الرسوم مدفوعة':'الرسوم متأخرة'}</span></div><div class="space-y-3 text-right"><div class="flex justify-between p-3 bg-gray-50 rounded-lg"><span class="text-gray-500">الهاتف</span><span class="font-semibold ltr">${s.phone}</span></div><div class="flex justify-between p-3 bg-gray-50 rounded-lg"><span class="text-gray-500">البريد</span><span class="font-semibold text-sm">${s.email}</span></div><div class="flex justify-between p-3 bg-gray-50 rounded-lg"><span class="text-gray-500">آخر دفع</span><span class="font-semibold">${s.lastPayment}</span></div></div><div class="mt-6"><button onclick="generateStudentQR('${s.id}')" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold mb-2"><i class="fas fa-qrcode ml-2"></i>عرض QR</button><button onclick="toggleFeeStatus('${s.id}')" class="w-full py-3 border-2 border-indigo-600 text-indigo-600 rounded-xl font-bold"><i class="fas fa-money-bill-wave ml-2"></i>تغيير حالة الرسوم</button></div></div></div><div class="lg:col-span-2 space-y-6"><div class="glass rounded-2xl p-6"><h4 class="font-bold text-lg mb-4">مستوى التقدم</h4><canvas id="progressChart" height="200"></canvas></div><div class="glass rounded-2xl p-6"><div class="flex justify-between items-center mb-4"><h4 class="font-bold text-lg">درجات الامتحانات</h4><button onclick="openExamModal('${s.id}')" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm"><i class="fas fa-plus ml-1"></i>إضافة درجة</button></div><div class="overflow-x-auto"><table class="w-full"><thead class="bg-gray-50"><tr><th class="px-4 py-3 text-right rounded-r-lg">المادة</th><th class="px-4 py-3 text-right">الدرجة</th><th class="px-4 py-3 text-right">من</th><th class="px-4 py-3 text-right">النسبة</th><th class="px-4 py-3 text-right rounded-l-lg">التاريخ</th></tr></thead><tbody>${s.exams.map(e=>{const pct=((e.score/e.max)*100).toFixed(0);return`<tr class="border-b border-gray-100 hover:bg-gray-50"><td class="px-4 py-3 font-semibold">${e.subject}</td><td class="px-4 py-3">${e.score}</td><td class="px-4 py-3 text-gray-500">${e.max}</td><td class="px-4 py-3"><div class="flex items-center gap-2"><div class="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden"><div class="h-full ${pct>=90?'bg-green-500':pct>=70?'bg-blue-500':pct>=60?'bg-yellow-500':'bg-red-500'} rounded-full" style="width:${pct}%"></div></div><span class="text-sm font-bold w-10">${pct}%</span></div></td><td class="px-4 py-3 text-gray-500 text-sm">${e.date}</td></tr>`;}).join('')}</tbody></table></div></div><div class="glass rounded-2xl p-6"><h4 class="font-bold text-lg mb-4">سجل الحضور</h4><div class="grid grid-cols-7 gap-2">${s.attendance.map((a,i)=>`<div class="aspect-square rounded-lg flex items-center justify-center text-xs font-bold ${a.status==='present'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}" title="${a.date}">${i+1}</div>`).join('')}</div><div class="flex gap-6 mt-4 text-sm"><span class="flex items-center gap-2"><div class="w-3 h-3 bg-green-100 rounded"></div>حضور:${presentCount}</span><span class="flex items-center gap-2"><div class="w-3 h-3 bg-red-100 rounded"></div>غياب:${absentCount}</span><span class="flex items-center gap-2 font-bold">نسبة:${attendanceRate}%</span></div></div></div></div>`;document.getElementById('studentModal').classList.add('active');setTimeout(()=>{const ctx=document.getElementById('progressChart');if(ctx){new Chart(ctx,{type:'line',data:{labels:s.exams.map(e=>e.subject),datasets:[{label:'الدرجات',data:s.exams.map(e=>e.score),borderColor:'#4f46e5',backgroundColor:'rgba(79,70,229,0.1)',fill:true,tension:0.4,pointRadius:6,pointBackgroundColor:'#4f46e5'}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:100}}}});}},100);}

function showAttendance(){setActiveNav(2);document.getElementById('pageTitle').textContent='تسجيل الغياب';const today=new Date().toISOString().split('T')[0];document.getElementById('contentArea').innerHTML=`<div class="glass rounded-2xl p-6 mb-6"><div class="flex flex-col md:flex-row justify-between items-center gap-4"><div><h3 class="text-xl font-bold">تسجيل الحضور والغياب</h3><p class="text-gray-500">تاريخ اليوم:${today}</p></div><div class="flex gap-2"><button onclick="markAllPresent()" class="px-4 py-2 bg-green-500 text-white rounded-lg">تسجيل الكل حضور</button><button onclick="openQRScanner()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg"><i class="fas fa-qrcode ml-2"></i>مسح QR</button></div></div></div><div class="glass rounded-2xl overflow-hidden"><div class="overflow-x-auto"><table class="w-full"><thead class="bg-gray-50"><tr><th class="px-6 py-4 text-right">الطالب</th><th class="px-6 py-4 text-right">الكود</th><th class="px-6 py-4 text-right">الصف</th><th class="px-6 py-4 text-center">الحالة</th><th class="px-6 py-4 text-center">إجراء</th></tr></thead><tbody>${store.students.map(s=>{const todayAtt=s.attendance.find(a=>a.date===today);return`<tr class="border-b border-gray-100 hover:bg-gray-50"><td class="px-6 py-4"><div class="flex items-center gap-3"><img src="${s.avatar}" class="w-10 h-10 rounded-full"><span class="font-semibold">${s.name}</span></div></td><td class="px-6 py-4 font-mono text-sm text-gray-500">${s.id}</td><td class="px-6 py-4 text-gray-600">${s.grade}</td><td class="px-6 py-4 text-center">${todayAtt?`<span class="px-3 py-1 rounded-full text-sm ${todayAtt.status==='present'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${todayAtt.status==='present'?'✓ حاضر':'✗ غائب'}</span>`:`<span class="px-3 py-1 rounded-full text-sm bg-gray-100 text-gray-500">لم يُسجل</span>`}</td><td class="px-6 py-4"><div class="flex justify-center gap-2"><button onclick="markAttendance('${s.id}','present')" class="w-10 h-10 rounded-lg bg-green-50 text-green-600 hover:bg-green-100 flex items-center justify-center"><i class="fas fa-check"></i></button><button onclick="markAttendance('${s.id}','absent')" class="w-10 h-10 rounded-lg bg-red-50 text-red-600 hover:bg-red-100 flex items-center justify-center"><i class="fas fa-times"></i></button></div></td></tr>`;}).join('')}</tbody></table></div></div>`;}

function markAttendance(id,status){const s=store.students.find(st=>st.id===id);const today=new Date().toISOString().split('T')[0];const existingIndex=s.attendance.findIndex(a=>a.date===today);if(existingIndex>=0){s.attendance[existingIndex].status=status;}else{s.attendance.push({date:today,status});}showToast(`تم تسجيل ${status==='present'?'الحضور':'الغياب'} للطالب ${s.name}`,'success');if(document.getElementById('pageTitle').textContent==='تسجيل الغياب'){showAttendance();}}

function markAllPresent(){store.students.forEach(s=>markAttendance(s.id,'present'));showAttendance();}

function openQRScanner(){document.getElementById('qrScannerModal').classList.add('active');document.getElementById('qrInput').focus();}
function handleQRInput(e){if(e.key==='Enter'){const code=e.target.value.trim();if(code)processQRCode(code);}}
function simulateQRScan(){const randomStudent=store.students[Math.floor(Math.random()*store.students.length)];document.getElementById('qrInput').value=randomStudent.id;setTimeout(()=>processQRCode(randomStudent.id),500);}
function processQRCode(code){const student=store.students.find(s=>s.id===code);closeModal('qrScannerModal');if(student){markAttendance(student.id,'present');showToast(`تم تسجيل حضور الطالب:${student.name}`,'success');if(store.userType==='teacher'){viewStudent(student.id);}}else{showToast('كود الطالب غير موجود!','error');}}

function generateStudentQR(id){const s=store.students.find(st=>st.id===id);document.getElementById('studentModalContent').innerHTML=`<div class="text-center py-8"><h3 class="text-2xl font-bold mb-2">${s.name}</h3><p class="text-gray-500 mb-6">${s.id}</p><div class="qr-container inline-block mb-6"><canvas id="qrCanvas"></canvas></div><div class="flex justify-center gap-3"><button onclick="viewStudent('${s.id}')" class="px-6 py-3 bg-gray-200 rounded-xl font-bold">رجوع</button><button onclick="downloadQR()" class="px-6 py-3 bg-indigo-600 text-white rounded-xl font-bold"><i class="fas fa-download ml-2"></i>تحميل QR</button></div></div>`;setTimeout(()=>{QRCode.toCanvas(document.getElementById('qrCanvas'),s.id,{width:250,margin:2,color:{dark:'#1e1b4b',light:'#ffffff'}});},100);}

function downloadQR(){const canvas=document.getElementById('qrCanvas');const link=document.createElement('a');link.download='student-qr.png';link.href=canvas.toDataURL();link.click();}

function showExams(){setActiveNav(3);document.getElementById('pageTitle').textContent='الامتحانات';document.getElementById('contentArea').innerHTML=`<div class="glass rounded-2xl p-6 mb-6"><div class="flex justify-between items-center"><h3 class="text-xl font-bold">إدارة الامتحانات</h3></div></div><div class="glass rounded-2xl overflow-hidden"><table class="w-full"><thead class="bg-gray-50"><tr><th class="px-6 py-4 text-right">الطالب</th><th class="px-6 py-4 text-right">المادة</th><th class="px-6 py-4 text-center">الدرجة</th><th class="px-6 py-4 text-center">التقدير</th><th class="px-6 py-4 text-right">التاريخ</th></tr></thead><tbody>${store.students.flatMap(s=>s.exams.map(e=>{const pct=(e.score/e.max)*100;let grade=pct>=90?'ممتاز':pct>=80?'جيد جداً':pct>=70?'جيد':pct>=60?'مقبول':'ضعيف';let color=pct>=90?'text-green-600':pct>=70?'text-blue-600':pct>=60?'text-yellow-600':'text-red-600';return`<tr class="border-b border-gray-100 hover:bg-gray-50"><td class="px-6 py-4 font-semibold">${s.name}</td><td class="px-6 py-4">${e.subject}</td><td class="px-6 py-4 text-center font-bold">${e.score}/${e.max}</td><td class="px-6 py-4 text-center font-bold ${color}">${grade}</td><td class="px-6 py-4 text-gray-500 text-sm">${e.date}</td></tr>`;})).join('')}</tbody></table></div>`;}

function openExamModal(studentId){const s=store.students.find(st=>st.id===studentId);document.getElementById('examModalContent').innerHTML=`<div class="space-y-4"><div><label class="block text-sm font-medium mb-1">الطالب</label><input type="text" value="${s.name}" disabled class="w-full px-4 py-2 rounded-lg bg-gray-100 border"><input type="hidden" id="examStudentId" value="${s.id}"></div><div><label class="block text-sm font-medium mb-1">المادة</label><select id="examSubject" class="w-full px-4 py-2 rounded-lg border border-gray-200 outline-none"><option value="الرياضيات">الرياضيات</option><option value="الفيزياء">الفيزياء</option><option value="الكيمياء">الكيمياء</option><option value="اللغة العربية">اللغة العربية</option><option value="اللغة الإنجليزية">اللغة الإنجليزية</option><option value="الأحياء">الأحياء</option></select></div><div class="grid grid-cols-2 gap-4"><div><label class="block text-sm font-medium mb-1">الدرجة</label><input type="number" id="examScore" max="100" class="w-full px-4 py-2 rounded-lg border border-gray-200 outline-none" placeholder="0-100"></div><div><label class="block text-sm font-medium mb-1">الحد الأقصى</label><input type="number" id="examMax" value="100" class="w-full px-4 py-2 rounded-lg border border-gray-200 outline-none"></div></div><div><label class="block text-sm font-medium mb-1">التاريخ</label><input type="date" id="examDate" value="${new Date().toISOString().split('T')[0]}" class="w-full px-4 py-2 rounded-lg border border-gray-200 outline-none"></div><div class="flex gap-2 mt-6"><button onclick="saveExam()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold">حفظ</button><button onclick="closeModal('examModal')" class="flex-1 py-3 bg-gray-200 rounded-xl font-bold">إلغاء</button></div></div>`;document.getElementById('examModal').classList.add('active');}

function saveExam(){const studentId=document.getElementById('examStudentId').value;const subject=document.getElementById('examSubject').value;const score=parseInt(document.getElementById('examScore').value);const max=parseInt(document.getElementById('examMax').value);const date=document.getElementById('examDate').value;if(!score||score<0||score>max){showToast('الرجاء إدخال درجة صحيحة','error');return;}const s=store.students.find(st=>st.id===studentId);s.exams.push({subject,score,max,date});closeModal('examModal');showToast('تم إضافة الدرجة بنجاح!','success');viewStudent(studentId);}

function showFees(){setActiveNav(4);document.getElementById('pageTitle').textContent='الرسوم الدراسية';const paid=store.students.filter(s=>s.feesPaid);const unpaid=store.students.filter(s=>!s.feesPaid);document.getElementById('contentArea').innerHTML=`<div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6"><div class="glass rounded-2xl p-6 bg-gradient-to-br from-green-500 to-green-600 text-white"><div class="flex items-center justify-between mb-4"><div><p class="text-green-100 text-sm">الطلاب المسددين</p><h3 class="text-4xl font-bold mt-1">${paid.length}</h3></div><div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center"><i class="fas fa-check-circle text-3xl"></i></div></div></div><div class="glass rounded-2xl p-6 bg-gradient-to-br from-red-500 to-red-600 text-white"><div class="flex items-center justify-between mb-4"><div><p class="text-red-100 text-sm">الطلاب المتأخرين</p><h3 class="text-4xl font-bold mt-1">${unpaid.length}</h3></div><div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center"><i class="fas fa-exclamation-circle text-3xl"></i></div></div></div></div><div class="glass rounded-2xl p-6"><h3 class="text-xl font-bold mb-6">قائمة الرسوم</h3><div class="space-y-3">${store.students.map(s=>`<div class="flex items-center justify-between p-4 ${s.feesPaid?'bg-green-50':'bg-red-50'} rounded-xl"><div class="flex items-center gap-4"><img src="${s.avatar}" class="w-12 h-12 rounded-full"><div><h4 class="font-bold">${s.name}</h4><p class="text-sm text-gray-500">${s.id} • آخر دفع:${s.lastPayment}</p></div></div><div class="flex items-center gap-4"><span class="px-4 py-2 rounded-lg font-bold ${s.feesPaid?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${s.feesPaid?'✓ مسدد':'✗ متأخر'}</span><button onclick="toggleFeeStatus('${s.id}')" class="p-2 hover:bg-gray-200 rounded-lg"><i class="fas fa-edit text-gray-600"></i></button></div></div>`).join('')}</div></div>`;}

function toggleFeeStatus(id){const s=store.students.find(st=>st.id===id);s.feesPaid=!s.feesPaid;s.lastPayment=s.feesPaid?new Date().toISOString().split('T')[0]:s.lastPayment;showToast(`تم تحديث حالة الرسوم للطالب ${s.name}`,'success');showFees();}

function showReports(){setActiveNav(5);document.getElementById('pageTitle').textContent='التقارير والإحصائيات';const gradeDistribution=store.students.map(s=>{const avg=(s.exams.reduce((a,e)=>a+e.score,0)/s.exams.length);return{name:s.name.split(' ')[0],avg:avg.toFixed(1),grade:s.grade};});document.getElementById('contentArea').innerHTML=`<div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6"><div class="glass rounded-2xl p-6"><h3 class="text-xl font-bold mb-4">أداء الطلاب حسب المادة</h3><canvas id="subjectChart" height="250"></canvas></div><div class="glass rounded-2xl p-6"><h3 class="text-xl font-bold mb-4">مقارنة الطلاب</h3><canvas id="compareChart" height="250"></canvas></div></div><div class="glass rounded-2xl p-6 mb-6"><h3 class="text-xl font-bold mb-4">تقرير شامل</h3><div class="overflow-x-auto"><table class="w-full"><thead class="bg-gray-50"><tr><th class="px-4 py-3 text-right rounded-r-lg">الطالب</th><th class="px-4 py-3 text-right">الصف</th><th class="px-4 py-3 text-center">متوسط الدرجات</th><th class="px-4 py-3 text-center">نسبة الحضور</th><th class="px-4 py-3 text-center">الرسوم</th><th class="px-4 py-3 text-center rounded-l-lg">التقدير</th></tr></thead><tbody>${store.students.map(s=>{const avg=(s.exams.reduce((a,e)=>a+e.score,0)/s.exams.length).toFixed(1);const attRate=((s.attendance.filter(a=>a.status==='present').length/s.attendance.length)*100).toFixed(0);let rating=avg>=90?'ممتاز':avg>=80?'جيد جداً':avg>=70?'جيد':avg>=60?'مقبول':'يحتاج متابعة';let ratingColor=avg>=90?'text-green-600':avg>=70?'text-blue-600':avg>=60?'text-yellow-600':'text-red-600';return`<tr class="border-b border-gray-100 hover:bg-gray-50"><td class="px-4 py-3 font-semibold">${s.name}</td><td class="px-4 py-3">${s.grade}</td><td class="px-4 py-3 text-center font-bold">${avg}%</td><td class="px-4 py-3 text-center"><span class="${attRate>=80?'text-green-600':attRate>=60?'text-yellow-600':'text-red-600'}">${attRate}%</span></td><td class="px-4 py-3 text-center"><span class="px-2 py-1 rounded text-xs ${s.feesPaid?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${s.feesPaid?'✓':'✗'}</span></td><td class="px-4 py-3 text-center font-bold ${ratingColor}">${rating}</td></tr>`;}).join('')}</tbody></table></div></div><div class="flex justify-end gap-3"><button onclick="window.print()" class="px-6 py-3 bg-gray-200 rounded-xl font-bold hover:bg-gray-300"><i class="fas fa-print ml-2"></i>طباعة</button><button onclick="exportToExcel()" class="px-6 py-3 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700"><i class="fas fa-file-excel ml-2"></i>تصدير Excel</button></div>`;setTimeout(()=>{const subjects=['الرياضيات','الفيزياء','الكيمياء','اللغة العربية','اللغة الإنجليزية','الأحياء'];const subjectAvgs=subjects.map(sub=>{const scores=store.students.flatMap(s=>s.exams.filter(e=>e.subject===sub).map(e=>e.score));return scores.length?(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1):0;});new Chart(document.getElementById('subjectChart'),{type:'radar',data:{labels:subjects,datasets:[{label:'متوسط المادة',data:subjectAvgs,backgroundColor:'rgba(79,70,229,0.2)',borderColor:'#4f46e5',pointBackgroundColor:'#4f46e5'}]},options:{responsive:true,scales:{r:{beginAtZero:true,max:100}}}});new Chart(document.getElementById('compareChart'),{type:'bar',data:{labels:store.students.map(s=>s.name.split(' ')[0]),datasets:[{label:'المتوسط',data:store.students.map(s=>(s.exams.reduce((a,e)=>a+e.score,0)/s.exams.length).toFixed(1)),backgroundColor:store.students.map(s=>{const avg=s.exams.reduce((a,e)=>a+e.score,0)/s.exams.length;return avg>=90?'#10b981':avg>=70?'#4f46e5':avg>=60?'#f59e0b':'#ef4444';}),borderRadius:8}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:100}}}});},100);}

function exportToExcel(){let csv='الاسم,الكود,الصف,متوسط الدرجات,نسبة الحضور,الرسوم\\n';store.students.forEach(s=>{const avg=(s.exams.reduce((a,e)=>a+e.score,0)/s.exams.length).toFixed(1);const att=((s.attendance.filter(a=>a.status==='present').length/s.attendance.length)*100).toFixed(0);csv+=`${s.name},${s.id},${s.grade},${avg}%,${att}%,${s.feesPaid?'مسددة':'متأخرة'}\\n`;});const blob=new Blob(["\\ufeff"+csv],{type:'text/csv;charset=utf-8;'});const link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download='students_report.csv';link.click();showToast('تم تصدير التقرير!','success');}

function showStudentPortal(){setActiveNav(0);const s=store.currentUser;const avgScore=(s.exams.reduce((a,e)=>a+e.score,0)/s.exams.length).toFixed(1);const presentCount=s.attendance.filter(a=>a.status==='present').length;const attendanceRate=((presentCount/s.attendance.length)*100).toFixed(0);document.getElementById('pageTitle').textContent='بوابة الطالب';document.getElementById('contentArea').innerHTML=`<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8"><div class="glass rounded-2xl p-6 text-center card-hover"><div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-graduation-cap text-indigo-600 text-2xl"></i></div><h3 class="text-3xl font-bold text-gray-800">${avgScore}%</h3><p class="text-gray-500 mt-1">متوسط الدرجات</p></div><div class="glass rounded-2xl p-6 text-center card-hover"><div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-calendar-check text-green-600 text-2xl"></i></div><h3 class="text-3xl font-bold text-gray-800">${attendanceRate}%</h3><p class="text-gray-500 mt-1">نسبة الحضور</p></div><div class="glass rounded-2xl p-6 text-center card-hover"><div class="w-16 h-16 ${s.feesPaid?'bg-green-100':'bg-red-100'} rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-money-bill-wave ${s.feesPaid?'text-green-600':'text-red-600'} text-2xl"></i></div><h3 class="text-3xl font-bold ${s.feesPaid?'text-green-600':'text-red-600'}">${s.feesPaid?'مسدد':'متأخر'}</h3><p class="text-gray-500 mt-1">حالة الرسوم</p></div></div><div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="glass rounded-2xl p-6"><h3 class="text-xl font-bold mb-4">تطور الأداء</h3><canvas id="myProgressChart" height="250"></canvas></div><div class="glass rounded-2xl p-6"><h3 class="text-xl font-bold mb-4">آخر الدرجات</h3><div class="space-y-3">${s.exams.slice(-4).map(e=>{const pct=((e.score/e.max)*100).toFixed(0);return`<div class="flex items-center justify-between p-3 bg-gray-50 rounded-xl"><div><p class="font-bold">${e.subject}</p><p class="text-sm text-gray-500">${e.date}</p></div><div class="text-left"><span class="text-2xl font-bold ${pct>=80?'text-green-600':pct>=60?'text-blue-600':'text-red-600'}">${e.score}</span><span class="text-gray-400">/${e.max}</span></div></div>`;}).join('')}</div></div></div><div class="glass rounded-2xl p-6 mt-6"><h3 class="text-xl font-bold mb-4">سجل الحضور</h3><div class="grid grid-cols-10 gap-2">${s.attendance.map((a,i)=>`<div class="aspect-square rounded-lg flex items-center justify-center text-sm font-bold ${a.status==='present'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${a.status==='present'?'✓':'✗'}</div>`).join('')}</div></div>`;setTimeout(()=>{new Chart(document.getElementById('myProgressChart'),{type:'line',data:{labels:s.exams.map(e=>e.subject),datasets:[{label:'درجاتي',data:s.exams.map(e=>e.score),borderColor:'#4f46e5',backgroundColor:'rgba(79,70,229,0.1)',fill:true,tension:0.4,pointRadius:6,pointBackgroundColor:'#4f46e5'}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:100}}}});},100);}

function showMyQR(){setActiveNav(1);const s=store.currentUser;document.getElementById('pageTitle').textContent='QR Code';document.getElementById('contentArea').innerHTML=`<div class="glass rounded-2xl p-8 text-center max-w-md mx-auto"><h3 class="text-2xl font-bold mb-2">${s.name}</h3><p class="text-gray-500 mb-6">${s.id}</p><div class="qr-container inline-block mb-6"><canvas id="myQR"></canvas></div><p class="text-gray-500 text-sm mb-6">استخدم هذا الكود لتسجيل حضورك</p><button onclick="downloadQR()" class="px-6 py-3 bg-indigo-600 text-white rounded-xl font-bold"><i class="fas fa-download ml-2"></i>تحميل QR</button></div>`;setTimeout(()=>{QRCode.toCanvas(document.getElementById('myQR'),s.id,{width:280,margin:2,color:{dark:'#1e1b4b',light:'#ffffff'}});},100);}

function showMyGrades(){setActiveNav(2);const s=store.currentUser;document.getElementById('pageTitle').textContent='درجاتي';document.getElementById('contentArea').innerHTML=`<div class="glass rounded-2xl p-6"><h3 class="text-xl font-bold mb-6">سجل الدرجات</h3><div class="space-y-4">${s.exams.map(e=>{const pct=((e.score/e.max)*100).toFixed(0);return`<div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl"><div><h4 class="font-bold text-lg">${e.subject}</h4><p class="text-sm text-gray-500">${e.date}</p></div><div class="flex items-center gap-4"><div class="w-32 h-3 bg-gray-200 rounded-full overflow-hidden"><div class="h-full ${pct>=90?'bg-green-500':pct>=70?'bg-blue-500':pct>=60?'bg-yellow-500':'bg-red-500'} rounded-full" style="width:${pct}%"></div></div><span class="text-2xl font-bold w-16 text-left">${e.score}</span></div></div>`;}).join('')}</div></div>`;}

function showMyAttendance(){setActiveNav(3);const s=store.currentUser;const present=s.attendance.filter(a=>a.status==='present').length;const absent=s.attendance.filter(a=>a.status==='absent').length;document.getElementById('pageTitle').textContent='حضوري';document.getElementById('contentArea').innerHTML=`<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6"><div class="glass rounded-2xl p-6 text-center"><h3 class="text-4xl font-bold text-green-600">${present}</h3><p class="text-gray-500 mt-1">أيام الحضور</p></div><div class="glass rounded-2xl p-6 text-center"><h3 class="text-4xl font-bold text-red-600">${absent}</h3><p class="text-gray-500 mt-1">أيام الغياب</p></div><div class="glass rounded-2xl p-6 text-center"><h3 class="text-4xl font-bold text-indigo-600">${((present/s.attendance.length)*100).toFixed(0)}%</h3><p class="text-gray-500 mt-1">نسبة الحضور</p></div></div><div class="glass rounded-2xl p-6"><h3 class="text-xl font-bold mb-4">التفاصيل</h3><div class="overflow-x-auto"><table class="w-full"><thead class="bg-gray-50"><tr><th class="px-4 py-3 text-right rounded-r-lg">التاريخ</th><th class="px-4 py-3 text-center rounded-l-lg">الحالة</th></tr></thead><tbody>${s.attendance.map(a=>`<tr class="border-b border-gray-100"><td class="px-4 py-3">${a.date}</td><td class="px-4 py-3 text-center"><span class="px-3 py-1 rounded-full text-sm ${a.status==='present'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${a.status==='present'?'✓ حاضر':'✗ غائب'}</span></td></tr>`).join('')}</tbody></table></div></div>`;}

function showMyProgress(){setActiveNav(4);const s=store.currentUser;document.getElementById('pageTitle').textContent='مستواي';document.getElementById('contentArea').innerHTML=`<div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="glass rounded-2xl p-6"><h3 class="text-xl font-bold mb-4">تطور الأداء</h3><canvas id="progressLineChart" height="300"></canvas></div><div class="glass rounded-2xl p-6"><h3 class="text-xl font-bold mb-4">أدائي حسب المادة</h3><canvas id="subjectRadarChart" height="300"></canvas></div></div><div class="glass rounded-2xl p-6 mt-6"><h3 class="text-xl font-bold mb-4">الإنجازات</h3><div class="grid grid-cols-2 md:grid-cols-4 gap-4">${[{icon:'fa-trophy',title:'التفوق',desc:'متوسط فوق 90%',achieved:(s.exams.reduce((a,e)=>a+e.score,0)/s.exams.length)>=90},{icon:'fa-star',title:'الانتظام',desc:'حضور فوق 80%',achieved:(s.attendance.filter(a=>a.status==='present').length/s.attendance.length)>=0.8},{icon:'fa-medal',title:'الالتزام',desc:'الرسوم مسددة',achieved:s.feesPaid},{icon:'fa-fire',title:'المثابرة',desc:'5 أيام متتالية',achieved:s.attendance.slice(-5).every(a=>a.status==='present')}].map(badge=>`<div class="p-4 rounded-xl text-center ${badge.achieved?'bg-gradient-to-br from-yellow-400 to-yellow-600 text-white':'bg-gray-100 text-gray-400'}"><i class="fas ${badge.icon} text-3xl mb-2"></i><h4 class="font-bold">${badge.title}</h4><p class="text-sm">${badge.desc}</p></div>`).join('')}</div></div>`;setTimeout(()=>{new Chart(document.getElementById('progressLineChart'),{type:'line',data:{labels:s.exams.map((e,i)=>`امتحان ${i+1}`),datasets:[{label:'الدرجات',data:s.exams.map(e=>e.score),borderColor:'#4f46e5',backgroundColor:'rgba(79,70,229,0.1)',fill:true,tension:0.4}]},options:{responsive:true,scales:{y:{beginAtZero:true,max:100}}}});new Chart(document.getElementById('subjectRadarChart'),{type:'radar',data:{labels:s.exams.map(e=>e.subject),datasets:[{label:'أدائي',data:s.exams.map(e=>e.score),backgroundColor:'rgba(79,70,229,0.2)',borderColor:'#4f46e5'}]},options:{responsive:true,scales:{r:{beginAtZero:true,max:100}}}});},100);}

function setActiveNav(index){document.querySelectorAll('.sidebar-link').forEach((el,i)=>{el.classList.toggle('active',i===index);});}
function toggleSidebar(){const sidebar=document.getElementById('sidebar');const overlay=document.getElementById('mobileOverlay');sidebar.classList.toggle('translate-x-full');sidebar.classList.toggle('translate-x-0');overlay.classList.toggle('hidden');}
function toggleNotifications(){const panel=document.getElementById('notificationsPanel');panel.classList.toggle('hidden');}
function closeModal(id){document.getElementById(id).classList.remove('active');}
function showToast(message,type='success'){const toast=document.createElement('div');toast.className=`fixed top-4 left-1/2 -translate-x-1/2 z-[9999] px-6 py-3 rounded-xl text-white font-bold shadow-lg animate-fade-in ${type==='success'?'bg-green-500':'bg-red-500'}`;toast.innerHTML=`<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'} ml-2"></i>${message}`;document.body.appendChild(toast);setTimeout(()=>toast.remove(),3000);}
document.querySelectorAll('.modal').forEach(modal=>{modal.addEventListener('click',(e)=>{if(e.target===modal)modal.classList.remove('active');});});
</script>
</body>
